name: MarginMart Deal Monitor

on:
  schedule:
    # Runs every 5 minutes (GitHub minimum is 5 min)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  monitor:
    name: Scan @deals for keyword matches
    runs-on: ubuntu-latest
    timeout-minutes: 4  # Kill if it hangs (keeps under 5 min window)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install telethon

      - name: Run deal monitor
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ALERT_CHAT_ID: ${{ secrets.ALERT_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MONITOR_CHANNELS: deals
          FETCH_LIMIT: "30"
        run: python scripts/poll_monitor.py
